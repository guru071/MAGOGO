version: '3.8'

services:
  ai-service:
    build:
      context: ./src/ai
      dockerfile: Dockerfile
    container_name: maghgo-ai
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - maghgo-net

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maghgo-web
    ports:
      - "80:3000"
    restart: unless-stopped
    depends_on:
      - ai-service
    env_file:
      - .env
    environment:
      # Internal Docker network URL so the web app can talk to the AI service
      - AI_SERVICE_URL=http://ai-service:8000 
    networks:
      - maghgo-net

networks:
  maghgo-net:
    driver: bridge
